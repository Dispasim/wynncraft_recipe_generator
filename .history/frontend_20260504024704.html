<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Recipe Generator</title>

<style>
    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .container {
        background: #1e293b;
        padding: 30px;
        border-radius: 12px;
        width: 420px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #38bdf8;
    }

    label {
        display: block;
        margin-top: 12px;
        margin-bottom: 5px;
        font-size: 14px;
        color: #cbd5e1;
    }

    input, select {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: none;
        outline: none;
        background: #0f172a;
        color: white;
        font-size: 14px;
    }

    input:focus, select:focus {
        outline: 2px solid #38bdf8;
    }

    button {
        margin-top: 20px;
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #38bdf8;
        color: #0f172a;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        background: #0ea5e9;
    }

    pre {
        margin-top: 20px;
        background: #0f172a;
        padding: 12px;
        border-radius: 8px;
        max-height: 250px;
        overflow: auto;
        font-size: 12px;
        color: #22c55e;
    }
</style>
</head>

<body>

<div class="container">

<h2>Recipe Generator</h2>

<label>Item:</label>
<select id="item">
    <option>helmet</option>
    <option>chestplate</option>
    <option>boots</option>
</select>

<label>Stat:</label>
<input id="stat" value="Melee Damage %">

<label>Level:</label>
<input id="level" type="number" value="117">

<label>Population size:</label>
<input id="pop" type="number" value="500">

<label>Generations:</label>
<input id="gen" type="number" value="100">

<button onclick="runAlgo()">Run</button>

<pre id="output"></pre>

</div>

<script>
async function runAlgo() {
    const body = {
        item: document.getElementById("item").value,
        stat: document.getElementById("stat").value,
        level: parseInt(document.getElementById("level").value),
        pop_size: parseInt(document.getElementById("pop").value),
        generations: parseInt(document.getElementById("gen").value),
        duration_min: 20
    };

    document.getElementById("output").innerText = "Running...";

    const res = await fetch("http://127.0.0.1:8000/run", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(body)
    });

    const data = await res.json();

    document.getElementById("output").innerText =
        JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
